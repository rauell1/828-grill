name: Update docs

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'   # prevent infinite loop when the bot commits docs

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need parent commit so git diff-tree works

      - name: Generate docs
        run: node scripts/update-docs.js

      - name: Commit updated docs
        run: |
          git config user.name  "docs-bot"
          git config user.email "docs-bot@828grill.noreply"
          git add docs/SITEMAP.md docs/CODEBASE.md docs/ROLLBACK.md
          # only commit if something actually changed
          git diff --cached --quiet || git commit -m "docs(auto): regenerate docs [skip ci]"
          git push
